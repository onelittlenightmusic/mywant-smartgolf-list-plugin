wantType:
  metadata:
    name: smartgolf_list_available
    title: SmartGolf Available Times
    description: |
      Lists available booking times for all SmartGolf rooms (北新宿/中野新橋/新中野)
      for today and tomorrow via Playwright.
      Completes after a single execution.
    version: '1.0'
    category: smartgolf
    pattern: independent

  finalResultField: smartgolf_all_available_times

  state:
    - name: skill_timeout_seconds
      description: Max seconds to wait for the skill script to complete (default 120)
      type: int
      label: goal
      persistent: false
      initialValue: 120

    - name: skill_path
      description: Path to the MRS skill script (set by onInitialize)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: mrs_raw_output
      description: Raw JSON output from the MRS skill (source for fetchFrom fields)
      type: object
      label: current
      persistent: false
      initialValue: null

    - name: error
      description: Error message if execution failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: summary
      description: Summary of available times
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: today_slots
      description: Available slots for today
      type: object
      label: current
      persistent: true
      initialValue: null

    - name: smartgolf_all_available_times
      description: Full JSON output from skill containing all rooms and dates
      type: object
      label: current
      persistent: true
      initialValue: {}
      fetchFrom: mrs_raw_output
      onFetchData: "available_times"

    - name: first_room
      description: First available room name
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "available_times[0].room"

    - name: first_date
      description: First available date
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "available_times[0].date"

    - name: first_time
      description: First available time slot
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "available_times[0].times[0].time"

  finalizeWhen:
    achieved:
      field: mrs_raw_output
      operator: "!="
      value: null
    failed:
      field: error
      operator: "!="
      value: ""

  onInitialize:
    current:
      skill_path: "~/.mywant/custom-types/mywant-smartgolf-list-plugin/main.py"

  requires:
    - monitor_mrs_agent

  examples:
    - name: List SmartGolf Available Times
      description: Check all SmartGolf rooms for today/tomorrow availability
      want:
        metadata:
          name: check_smartgolf
          type: smartgolf_list_available
        spec:
          exposes:
            - currentState: smartgolf_all_available_times
              as: smartgolf_all_available_times
            - currentState: today_slots
              as: today_slots

    - name: SmartGolf Selector Example
      description: Interactive selector for SmartGolf slots
      want:
        metadata:
          name: smartgolf-selector
          type: choice
        spec:
          params:
            target_param: selected_slot
            choice_import_field: wants.check_smartgolf.smartgolf_all_available_times
